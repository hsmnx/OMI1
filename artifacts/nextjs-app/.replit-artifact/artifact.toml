kind = "web"
previewPath = "/"
title = "Next.js Bilingual Foundation"
version = "1.0.0"
id = "artifacts/nextjs-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19344

[services.development]
run = "pnpm --filter @workspace/nextjs-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nextjs-app", "run", "build" ]
run = "pnpm --filter @workspace/nextjs-app run start"

[services.env]
PORT = "19344"
