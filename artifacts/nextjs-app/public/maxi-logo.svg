<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <!-- Light blue background -->
  <rect width="120" height="60" rx="8" fill="#d6eef8"/>

  <!-- Red star at top-center -->
  <polygon points="60,4 62.4,11.2 70,11.2 64,15.8 66.4,23 60,18.4 53.6,23 56,15.8 50,11.2 57.6,11.2" fill="#CC2020"/>

  <!-- "maxi" text in bold red - script-style using text -->
  <text x="60" y="38" font-family="Georgia, serif" font-size="20" font-weight="700" font-style="italic" fill="#CC2020" text-anchor="middle" letter-spacing="-0.5">maxi</text>

  <!-- White banner for "Clean" -->
  <rect x="22" y="42" width="76" height="15" rx="4" fill="white" stroke="#90CAE8" stroke-width="0.5"/>

  <!-- "Clean" text in sky blue -->
  <text x="60" y="53.5" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#009FD4" text-anchor="middle" letter-spacing="1">Clean</text>
</svg>
